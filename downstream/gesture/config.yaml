# ==============================================================================
# CleanSEMG — STCNet Gesture Recognition Downstream Config
# CleanSEMG path: downstream/gesture/config.yaml
#
# All relative paths are resolved from CLEANSEMG_ROOT.
# Set: export CLEANSEMG_ROOT=/path/to/CleanSEMG
#      export DATA_ROOT=/path/to/your/data
# ==============================================================================

# ── Inputs from main pipeline ─────────────────────────────────────────────────
qc_index: "outputs/preprocessed/DB2/logs/qc_index.csv"
test_npz:  "outputs/test_data/test_combined.npz"

# ── Raw data (user must provide) ──────────────────────────────────────────────
db2_raw: "${DATA_ROOT}/DB2"

# ── Model weights ─────────────────────────────────────────────────────────────
weights_dir: "outputs/weights_baseline"
tradition_params: "outputs/weights_tradition/tradition_params.json"

# ── STCNet trained model ──────────────────────────────────────────────────────
stcnet_model: "downstream/gesture/STCNet/save/CE/nina2_STCNet_models/best_model.pth"

# ── Outputs (all relative to CLEANSEMG_ROOT) ─────────────────────────────────
output:
  noisy_mat:        "outputs/downstream/gesture/noisy/DB2"
  denoised_prefix:  "outputs/downstream/gesture"
  pkl_prefix:       "downstream/gesture/STCNet/pkl"
  results:          "outputs/downstream/gesture/results"
  logs:             "outputs/downstream/gesture/logs"

# ── Runtime settings ──────────────────────────────────────────────────────────
device:     "cuda"
gpu_id:     "0"
batch_size: 16
dataset:    "nina2"

# ── Denoisers to evaluate ─────────────────────────────────────────────────────
classical_methods: ["hp", "emd", "vmd", "ceemdan"]
neural_models:     ["FCN", "SDEMG", "MSEMG", "TrustEMGNet_RM"]

# ── Preprocessing ─────────────────────────────────────────────────────────────
bandpass:
  low:   20.0
  high:  500.0
  order: 4

stcnet_preprocessing:
  normalize:          "minmax"
  max_sampling_ratio: 10    # 1000 Hz → 100 Hz