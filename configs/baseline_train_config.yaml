# ==============================================================================
# CleanSEMG — Neural Denoiser Training Hyperparameters
# CleanSEMG path: configs/baseline_train_config.yaml
#
# Per-model hyperparameters for training all neural denoisers.
# Common defaults under baseline_train.defaults.
# Per-model overrides under baseline_train.models.<ModelName>.
#
# Sources:
#   TrustEMGNet_RM   : Wang et al., IEEE JBHI 29(4):2506-2520, 2025
#                      doi: 10.1109/JBHI.2024.3475817
#                      Adam, L1, batch=256, lr: 1e-2→1e-3(ep3)→1e-4(ep30)
#   MSEMG            : Adapted from EMG-MAMBA (ICASSP 2025)
#   FCN              : AdamW, L1, batch=64, lr=1e-3
#   CNN_waveform     : AdamW, L1, batch=64, lr=1e-3
#   SDEMG            : Liu et al., ICASSP 2024
#                      Adam, diffusion MSE (pred_noise), batch=64, lr=1e-4
#                      NOTE: loss is diffusion MSE, not comparable to L1 models
# ==============================================================================

baseline_train:

  defaults:
    epochs:          150
    batch_size:      64
    lr:              1.0e-3
    lr_schedule:     plateau      # plateau | step | constant
    patience:        20
    clip_grad:       10.0
    num_workers:     4
    prefetch_factor: 4
    pin_memory:      true
    cache_noise:     true

  models:

    TrustEMGNet_RM:
      epochs:             200
      batch_size:         256
      lr:                 1.0e-2
      lr_schedule:        step
      lr_step_milestones: [3, 30]
      lr_step_gamma:      0.1
      patience:           15
      clip_grad:          1.0

    TrustEMGNet_UNetonly:
      epochs:             200
      batch_size:         256
      lr:                 1.0e-2
      lr_schedule:        step
      lr_step_milestones: [3, 30]
      lr_step_gamma:      0.1
      patience:           15
      clip_grad:          1.0

    MSEMG:
      epochs:              200
      batch_size:          64
      lr:                  1.0e-4
      adam_betas:          [0.9, 0.99]
      optimizer:           adam
      lr_schedule:         plateau
      lr_plateau_factor:   0.8
      lr_plateau_patience: 5
      patience:            20
      clip_grad:           1.0

    FCN:
      epochs:     150
      batch_size: 64
      lr:         1.0e-3
      patience:   20
      clip_grad:  10.0

    CNN_waveform:
      epochs:     150
      batch_size: 64
      lr:         1.0e-3
      patience:   20
      clip_grad:  10.0

    SDEMG:
      epochs:              100
      batch_size:          64
      lr:                  1.0e-4
      optimizer:           adam
      adam_betas:          [0.9, 0.99]
      lr_schedule:         plateau
      lr_plateau_factor:   0.5
      lr_plateau_patience: 4
      patience:            20
      clip_grad:           1.0
      num_workers:         4