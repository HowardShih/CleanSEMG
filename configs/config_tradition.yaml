# ==============================================================================
# Traditional Baseline Config  v2  (HP + TS + EMD + VMD + CEEMDAN)
# Inherits dataset/path settings from config.yaml; override here as needed.
# ${CLEANSEMG_ROOT}/config_tradition.yaml
#
# References
# ----------
# HP / TS : Wang et al. (TrustEMG-Net), IEEE JBHI 29(4):2506-2520, 2025.
#           doi: 10.1109/JBHI.2024.3475817
# EMD     : Huang et al., Proc. R. Soc. London A, 1998.
#           Phinyomark et al., Comput. Biol. Med., 2011.
# VMD-SIT : Dragomiretskiy & Zosso, IEEE Trans. Signal Process., 2014.
#           Xiao et al., J. Neural Eng. 16(5):056017, 2019.
# CEEMDAN : Torres et al., ICASSP 2011.
#           Colominas et al., Biomed. Signal Process. Control 14, 2014.
# ==============================================================================

exp:
  name: "tradition_baseline_v2"

# ── TrustEMG-Net IIR Filter Chain ─────────────────────────────────────────────
hp:
  order: 4
  filter_type: "trustemg_iir_chain"

  bw_hp_hz: 10.0
  pli_center_hz: 60.0
  pli_quality: 5.0
  moa_machado_hp_hz: 40.0
  moa_nstdb_hp_hz: 20.0
  moa_default_hp_hz: 40.0
  ecg_hp_hz: 40.0
  wgn_bp_low_hz: 20.0
  wgn_bp_high_hz: 500.0
  color_as_wgn: true

  sweep:
    enabled: false

# ── Template Subtraction ──────────────────────────────────────────────────────
ts:
  peak_detect_bp_low_hz: 2.5
  peak_detect_bp_high_hz: 50.0
  peak_detect_order: 4
  avg_window: 11
  min_peaks: 2
  tile_factor: 8
  fallback: "noisy"              # "noisy" | "hp"
  min_beat_gap_samples: 140

# ── EMD (Empirical Mode Decomposition) ───────────────────────────────────────
# Denoising strategy: decompose → soft-threshold noise-dominant IMFs
# (dominant freq outside sEMG band) → reconstruct.
# Ref: Phinyomark et al., Comput. Biol. Med. 41(7):664-675, 2011.
emd:
  f_min_hz: 20.0          # IMFs with dom.freq < f_min are noise-dominant
  f_max_hz: 500.0
  max_imfs: 20
  fallback: "noisy"       # "noisy" | "hp"

  sweep:
    enabled: true
    # Sweep the lower frequency boundary for "signal-band" IMF selection.
    # IMFs with dominant freq < f_min_candidate are soft-thresholded.
    f_min_candidates: [10, 15, 20, 25, 30, 40]   # Hz
    metric: "SNRimp"
    max_cal_samples: 200           # small: EMD is ~0.1-0.5 s/sample

# ── VMD  (VMD-SIT) ───────────────────────────────────────────────────────────
# Denoising strategy: decompose into K VMFs → soft-threshold VMFs whose
# center frequency lies outside sEMG band → reconstruct.
# alpha=2000 is the "moderate bandwidth" standard for biomedical signals
# (Dragomiretskiy & Zosso 2014; confirmed by Li et al. J. Sensors 2022).
# Ref: Xiao et al., J. Neural Eng. 16(5):056017, 2019.
vmd:
  alpha: 2000.0           # bandwidth constraint — do NOT change without reason
  tau: 0.0                # noise-tolerance (0 for no fidelity enforcement)
  K: 6                    # number of modes (default; overridden by sweep)
  init: 1                 # 1 = uniformly distributed center frequencies
  tol: 1.0e-7             # convergence tolerance
  f_min_hz: 20.0          # keep VMFs with center freq >= this
  f_max_hz: 500.0
  fallback: "noisy"

  sweep:
    enabled: false
    K_candidates: [3, 4, 5, 6, 7, 8]
    metric: "SNRimp"
    max_cal_samples: 100           # VMD is expensive (~0.5-2 s/sample)

# ── CEEMDAN ───────────────────────────────────────────────────────────────────
# Same IMF-classification strategy as EMD; CEEMDAN suppresses mode aliasing.
# trials=100, epsilon=0.005 follow Torres et al. 2011 and common sEMG usage
# (Zong et al. Circuits Syst. Signal Process. 41, 2022).
ceemdan:
  trials: 20              # noise-ensemble size
  epsilon: 0.005          # noise amplitude relative to signal std
  f_min_hz: 20.0
  f_max_hz: 500.0
  fallback: "noisy"

  sweep:
    enabled: false
    f_min_candidates: [10, 15, 20, 25, 30, 40]
    metric: "SNRimp"
    max_cal_samples: 10           # CEEMDAN is very slow (~2-10 s/sample)

# ── Evaluation ────────────────────────────────────────────────────────────────
eval:
  test_data_file: "test_combined.npz"
  batch_size: 256
  methods: ["hp", "ts", "emd", "vmd", "ceemdan"]
  metrics:
    - SNRimp
    - RMSE
    - PRD
    - LSD
    - RMSE_ARV
    - RMSE_ZCR
    - RMSE_MNF
    - RMSE_MDF
    - RMSE_Kurtosis
  sampling_rate: 1000